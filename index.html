<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ─── Gist Cloud Sync ───
const GIST_FILENAME = 'tcg_collection_sync.json';
function getSyncConfig() {
  try { return JSON.parse(localStorage.getItem('tcg_sync_config') || 'null'); } catch { return null; }
}
function saveSyncConfig(cfg) { localStorage.setItem('tcg_sync_config', JSON.stringify(cfg)); }

async function gistAPI(path, token, opts = {}) {
  const res = await fetch('https://api.github.com/gists' + path, {
    ...opts,
    headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json', ...(opts.headers || {}) },
  });
  if (!res.ok) throw new Error('Gist API ' + res.status);
  return res.json();
}
async function findGist(token) {
  const gists = await gistAPI('?per_page=100', token);
  return gists.find(g => g.files && g.files[GIST_FILENAME]);
}
async function createGist(token, data) {
  return gistAPI('', token, { method: 'POST', body: JSON.stringify({ description: 'TCG Collection Sync', public: false, files: { [GIST_FILENAME]: { content: JSON.stringify(data) } } }) });
}
async function readGist(token, gistId) {
  const g = await gistAPI('/' + gistId, token);
  const raw = g.files[GIST_FILENAME]?.content;
  return raw ? JSON.parse(raw) : null;
}
async function writeGist(token, gistId, data) {
  return gistAPI('/' + gistId, token, { method: 'PATCH', body: JSON.stringify({ files: { [GIST_FILENAME]: { content: JSON.stringify(data) } } }) });
}
async function getGistHistory(token, gistId) {
  const g = await gistAPI('/' + gistId, token);
  return (g.history || []).slice(0, 10);
}
async function readGistVersion(token, gistId, sha) {
  const g = await gistAPI('/' + gistId + '/' + sha, token);
  const raw = g.files[GIST_FILENAME]?.content;
  return raw ? JSON.parse(raw) : null;
}
// Merge two card arrays by ID: keep both sides, prefer newer for conflicts
function mergeCards(local, remote) {
  const map = new Map();
  // Add all local cards first
  for (const c of local) map.set(c.id, c);
  // Merge remote: if same ID exists, keep the one with newer updatedAt/createdAt
  for (const c of remote) {
    const existing = map.get(c.id);
    if (!existing) {
      map.set(c.id, c); // remote-only card → add
    } else {
      const localTime = existing.updatedAt || existing.createdAt || 0;
      const remoteTime = c.updatedAt || c.createdAt || 0;
      if (remoteTime > localTime) {
        // Remote is newer — keep remote data but preserve local full-res photo
        map.set(c.id, { ...c, photo: existing.photo || c.photo || '' });
      }
      // else keep local (already in map)
    }
  }
  return Array.from(map.values()).sort((a, b) => b.createdAt - a.createdAt);
}

// Compress photo for sync (max 400px, JPEG 55%)
function compressPhoto(dataUrl) {
  return new Promise((resolve) => {
    if (!dataUrl) { resolve(''); return; }
    const img = new Image();
    img.onload = () => {
      const MAX = 400;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', 0.55));
    };
    img.onerror = () => resolve('');
    img.src = dataUrl;
  });
}

function parseGrade(grade) {
  if (!grade) return { company: '', score: '' };
  if (grade === 'RAW카드' || grade === 'Raw(미등급)') return { company: 'RAW카드', score: '' };
  const match = grade.match(/^(\S+)\s+(.+)$/);

  return { company: grade, score: '' };
}

  if (!company) return '';
  if (company === 'RAW카드') return 'RAW카드';
  if (score === '' || score === undefined) return company;
  return company + ' ' + score;
}

// ─── Price Lookup: eBay + 130point ───
const PRICE_SEARCH_SITES = [

  },
  {

    color: '#0064d2',
    url: (name, cat) => {

      const q = (catKey[cat] || 'tcg card') + ' ' + name;

function LazyImage({ src, alt, className, style }) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) { setVisible(true); obs.disconnect(); }
    }, { rootMargin: '200px' });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  if (visible) return <img src={src} alt={alt} className={className} style={style} />;
  return <div ref={ref} className={className} style={{ ...style, background: '#334155' }} />;
}

function App() {
  const [cards, setCards] = useState(loadCards);
  const [screen, setScreen] = useState('list'); // list, add, detail, edit, sync
  const [selectedCard, setSelectedCard] = useState(null);
  const [editCard, setEditCard] = useState(null);
  const [filter, setFilter] = useState('all');
  const [statusFilter, setStatusFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [sort, setSort] = useState('newest');
  const [pageSize, setPageSize] = useState(20);
  const [showExport, setShowExport] = useState(false);
  const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);
  const [theme, setTheme] = useState(() => localStorage.getItem('tcg_theme') || 'dark');
  const [batchMode, setBatchMode] = useState(false);
  const [selectedIds, setSelectedIds] = useState(new Set());
  const [compareIds, setCompareIds] = useState([]);
  const [syncStatus, setSyncStatus] = useState('');
  const syncTimer = useRef(null);

  useEffect(() => { saveCards(cards); }, [cards]);
  useEffect(() => { setPageSize(20); }, [filter, statusFilter, search]);

  // v31: Theme effect
  useEffect(() => {
    document.documentElement.dataset.theme = theme;
    localStorage.setItem('tcg_theme', theme);
    // Update theme-color meta
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.content = theme === 'dark' ? '#1e293b' : '#f1f5f9';
  }, [theme]);

  // v31: Auto-sync on app start
  useEffect(() => {
    const cfg = getSyncConfig();
    if (cfg?.token && cfg?.gistId) {
      // Silent pull on app open
      pullFromGist(true);
    }
  }, []);

  // v31: Auto-sync after card changes (debounced)
  const autoSyncTimer = useRef(null);
  function scheduleAutoSync() {
    if (autoSyncTimer.current) clearTimeout(autoSyncTimer.current);
    autoSyncTimer.current = setTimeout(() => {
      const cfg = getSyncConfig();
      if (cfg?.token && cfg?.gistId) pushToGist();
    }, 5000);
  }

  // v31: Batch helpers
  function toggleSelectId(id) {
    setSelectedIds(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  }
  function batchSetStatus(newStatus) {
    setCards(prev => prev.map(c => selectedIds.has(c.id) ? { ...c, status: newStatus, updatedAt: Date.now() } : c));
    setBatchMode(false); setSelectedIds(new Set());
    scheduleAutoSync();
  }
  function batchSetCategory(newCat) {
    setCards(prev => prev.map(c => selectedIds.has(c.id) ? { ...c, category: newCat, updatedAt: Date.now() } : c));
    setBatchMode(false); setSelectedIds(new Set());
    scheduleAutoSync();
  }
  function batchDelete() {
    if (!confirm(selectedIds.size + '장의 카드를 삭제하시겠습니까?')) return;
    setCards(prev => prev.filter(c => !selectedIds.has(c.id)));
    setBatchMode(false); setSelectedIds(new Set());
    scheduleAutoSync();
  }
  // v31: Compare toggle
  function toggleCompare(id) {
    setCompareIds(prev => {
      if (prev.includes(id)) return prev.filter(x => x !== id);
      if (prev.length >= 3) return prev; // max 3
      return [...prev, id];
    });
  }

  // ═══ Robust Sync: merge both sides, save everywhere atomically ═══
  const syncingRef = useRef(false);

  // Helper: compress all cards for Gist upload
  async function buildSyncPayload(cardList) {
    const syncCards = [];
    for (const c of cardList) {
      const { photo, syncPhoto, ...data } = c;
      const compressed = (photo && photo.startsWith('data:')) ? await compressPhoto(photo) : (syncPhoto || '');
      syncCards.push({ ...data, syncPhoto: compressed });
    }
    return syncCards;
  }

  // Helper: save merged cards to BOTH React state AND localStorage synchronously
  function saveMergedCards(merged) {
    saveCards(merged);      // localStorage — immediate
    setCards(merged);       // React state — triggers re-render
  }

  // Ensure Gist connection exists, return config or null
  async function ensureGistConnection() {
    const cfg = getSyncConfig();
    if (!cfg?.token) { setScreen('sync'); return null; }
    if (cfg.gistId) return cfg;
    try {
      setSyncStatus('syncing');
      const existing = await findGist(cfg.token);
      let gistId = existing ? existing.id : null;
      if (!gistId) {
        const created = await createGist(cfg.token, { cards: [], lastSync: Date.now() });
        gistId = created.id;
      }
      const newCfg = { ...cfg, gistId };
      saveSyncConfig(newCfg);
      return newCfg;
    } catch(e) {
      setSyncStatus('error'); setTimeout(() => setSyncStatus(''), 3000);
      return null;
    }
  }

  // FULL SYNC: read both → merge → save local + push remote (atomic)
  async function doSync() {
    if (syncingRef.current) return;
    const cfg = await ensureGistConnection();
    if (!cfg) return;
    syncingRef.current = true;
    backupCards();
    try {
      setSyncStatus('syncing');
      // 1. Read both sides
      const localCards = loadCards();
      const remote = await readGist(cfg.token, cfg.gistId);
      const remoteCards = remote?.cards || [];
      // 2. Restore full-res photos from local, fallback to syncPhoto
      const localPhotoMap = new Map(localCards.filter(c => c.photo).map(c => [c.id, c.photo]));
      const remoteWithPhotos = remoteCards.map(c => {
        const { syncPhoto, ...data } = c;
        return { ...data, photo: localPhotoMap.get(c.id) || syncPhoto || '' };
      });
      // 3. Merge: keep all cards from both sides, prefer newer for conflicts
      const merged = mergeCards(localCards, remoteWithPhotos);
      // 4. Save to localStorage + React state FIRST (before push)
      saveMergedCards(merged);
      // 5. Push merged result to Gist
      const syncPayload = await buildSyncPayload(merged);
      await writeGist(cfg.token, cfg.gistId, { cards: syncPayload, lastSync: Date.now() });
      setSyncStatus('done');
      setTimeout(() => setSyncStatus(''), 1500);
    } catch(e) {
      console.error('Sync error:', e);
      setSyncStatus('error');
      setTimeout(() => setSyncStatus(''), 3000);
    } finally { syncingRef.current = false; }
  }

  // PUSH: merge-then-push (never blindly overwrite remote)
  async function pushToGist() {
    if (syncingRef.current) return;
    const cfg = getSyncConfig();
    if (!cfg?.token || !cfg?.gistId) return;
    syncingRef.current = true;
    backupCards();
    try {
      setSyncStatus('syncing');
      // Read remote first to avoid overwriting remote-only cards
      const localCards = loadCards();
      let merged = localCards;
      try {
        const remote = await readGist(cfg.token, cfg.gistId);
        const remoteCards = remote?.cards || [];
        if (remoteCards.length > 0) {
          const localPhotoMap = new Map(localCards.filter(c => c.photo).map(c => [c.id, c.photo]));
          const remoteWithPhotos = remoteCards.map(c => {
            const { syncPhoto, ...data } = c;
            return { ...data, photo: localPhotoMap.get(c.id) || syncPhoto || '' };
          });
          merged = mergeCards(localCards, remoteWithPhotos);
          saveMergedCards(merged);
        }
      } catch(e) { /* remote read failed — push local as-is */ }
      const syncPayload = await buildSyncPayload(merged);
      await writeGist(cfg.token, cfg.gistId, { cards: syncPayload, lastSync: Date.now() });
      setSyncStatus('done');
      setTimeout(() => setSyncStatus(''), 1500);
    } catch(e) {
      console.error('Push error:', e);
      setSyncStatus('error');
      setTimeout(() => setSyncStatus(''), 3000);
    } finally { syncingRef.current = false; }
  }

  // PULL: merge remote into local (never discard local-only cards)
  async function pullFromGist(silent) {
    if (syncingRef.current) return;
    const cfg = getSyncConfig();
    if (!cfg?.token || !cfg?.gistId) return;
    syncingRef.current = true;
    backupCards();
    try {
      if (!silent) setSyncStatus('syncing');
      const remote = await readGist(cfg.token, cfg.gistId);
      const remoteCards = remote?.cards || [];
      const localCards = loadCards();
      if (remoteCards.length === 0 && localCards.length > 0) {
        syncingRef.current = false;
        await pushToGist();
        return;
      }
      const localPhotoMap = new Map(localCards.filter(c => c.photo).map(c => [c.id, c.photo]));
      const remoteWithPhotos = remoteCards.map(c => {
        const { syncPhoto, ...data } = c;
        return { ...data, photo: localPhotoMap.get(c.id) || syncPhoto || '' };
      });
      const merged = mergeCards(localCards, remoteWithPhotos);
      saveMergedCards(merged);
      if (!silent) { setSyncStatus('done'); setTimeout(() => setSyncStatus(''), 1500); }
    } catch(e) {
      console.error('Pull error:', e);
      if (!silent) { setSyncStatus('error'); setTimeout(() => setSyncStatus(''), 3000); }
    } finally { syncingRef.current = false; }
  }

  const filtered = useMemo(() => {
    let list = [...cards];
    if (filter !== 'all') list = list.filter(c => c.category === filter);
    if (statusFilter !== 'all') list = list.filter(c => (c.status || 'owned') === statusFilter);
    if (search.trim()) {
      const q = search.trim().toLowerCase();
      list = list.filter(c => c.name.toLowerCase().includes(q) || (c.memo || '').toLowerCase().includes(q) || (c.seller || '').toLowerCase().includes(q));
    }
    switch (sort) {
      case 'oldest': list.sort((a, b) => a.createdAt - b.createdAt); break;
      case 'price-high': list.sort((a, b) => (b.price || 0) - (a.price || 0)); break;
      case 'price-low': list.sort((a, b) => (a.price || 0) - (b.price || 0)); break;
      case 'value-high': list.sort((a, b) => (b.currentValue || 0) - (a.currentValue || 0)); break;
      case 'value-low': list.sort((a, b) => (a.currentValue || 0) - (b.currentValue || 0)); break;
      case 'name': list.sort((a, b) => a.name.localeCompare(b.name, 'ko')); break;
      default: list.sort((a, b) => b.createdAt - a.createdAt);
    }
    return list;
  }, [cards, filter, statusFilter, search, sort]);

  const stats = useMemo(() => {
    const total = cards.length;
    const owned = cards.filter(c => (c.status || 'owned') === 'owned');
    const wishlist = cards.filter(c => c.status === 'wishlist');
    const sold = cards.filter(c => c.status === 'sold');
    const totalSpent = owned.reduce((s, c) => s + (c.price || 0), 0);
    const totalValue = owned.reduce((s, c) => s + (c.currentValue || c.price || 0), 0);
    const totalSoldRevenue = sold.reduce((s, c) => s + (c.soldPrice || 0), 0);
    const totalSoldCost = sold.reduce((s, c) => s + (c.price || 0), 0);
    const byCat = {};
    CATEGORIES.forEach(cat => { byCat[cat.value] = cards.filter(c => c.category === cat.value).length; });
    return { total, totalSpent, totalValue, totalSoldRevenue, totalSoldCost, byCat, ownedCount: owned.length, wishlistCount: wishlist.length, soldCount: sold.length };
  }, [cards]);

  function addCard(card) {
    setCards(prev => [...prev, { ...card, id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6), createdAt: Date.now() }]);
    setScreen('list');
    scheduleAutoSync();
  }
  function updateCard(updated) {
    setCards(prev => prev.map(c => c.id === updated.id ? { ...c, ...updated, updatedAt: Date.now() } : c));
    setSelectedCard(prev => ({ ...prev, ...updated }));
    setScreen('detail');
    setEditCard(null);
    scheduleAutoSync();
  }
  function deleteCard(id) {
    setCards(prev => prev.filter(c => c.id !== id));
    setSelectedCard(null);
    setShowDeleteConfirm(false);
    setScreen('list');
    scheduleAutoSync();
  }

  function exportCSV() {
    const header = '이름,카테고리,등급,상태,구매일,구매가(원),현재시세(원),판매가(원),판매일,판매처,메모,등록일';
    const rows = cards.map(c => {
      const cat = CATEGORIES.find(x => x.value === c.category);
      const st = CARD_STATUSES.find(s => s.value === (c.status || 'owned'));
      return [c.name, cat ? cat.label : c.category, c.grade || '', st ? st.label : '보유', c.purchaseDate || '', c.price || 0, c.currentValue || 0, c.soldPrice || 0, c.soldDate || '', c.seller || '', (c.memo || '').replace(/,/g, ' '), new Date(c.createdAt).toLocaleDateString('ko-KR')].join(',');
    });
    const csv = '\uFEFF' + header + '\n' + rows.join('\n');
    downloadFile(csv, 'tcg_collection.csv', 'text/csv;charset=utf-8');
  }
  function exportJSON() {
    const data = cards.map(c => {
      const { photo, ...rest } = c; // exclude base64 photo from JSON export
      return rest;
    });
    downloadFile(JSON.stringify(data, null, 2), 'tcg_collection.json', 'application/json');
  }
  function downloadFile(content, filename, type) {
    const blob = new Blob([content], { type });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
    setShowExport(false);
  }

  function importJSON(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (Array.isArray(data)) {
          const newCards = data.filter(d => d.name && d.category);
          if (newCards.length > 0) {
            setCards(prev => {
              const existIds = new Set(prev.map(c => c.id));
              const toAdd = newCards.filter(c => !existIds.has(c.id));
              return [...prev, ...toAdd];
            });
            alert(`${newCards.length}건 중 새로운 카드를 가져왔습니다.`);
          }
        }
      } catch { alert('올바른 JSON 파일이 아닙니다.'); }
    };
    reader.readAsText(file);
    e.target.value = '';
    setShowExport(false);
  }

            </div>

        <div style={{ fontSize: 12, color: '#475569', marginBottom: 16 }}>
          등록: {new Date(selectedCard.createdAt).toLocaleDateString('ko-KR')}
        </div>

        <div style={{ display: 'flex', gap: 8 }}>
          <button className="btn btn-primary" style={{ flex: 1 }} onClick={() => { setEditCard(selectedCard); setScreen('edit'); }}>✏️ 수정</button>
          <button className="btn btn-danger" onClick={() => setShowDeleteConfirm(true)}>🗑️</button>
        </div>

        {showDeleteConfirm && (

            <div className="modal-content" onClick={e => e.stopPropagation()} style={{ maxWidth: 340, textAlign: 'center' }}>
              <p style={{ fontSize: 16, marginBottom: 20 }}>'{selectedCard.name}'을(를) 삭제하시겠습니까?</p>
              <div style={{ display: 'flex', gap: 8 }}>
                <button className="btn btn-outline" style={{ flex: 1 }} onClick={() => setShowDeleteConfirm(false)}>취소</button>
                <button className="btn btn-danger" style={{ flex: 1 }} onClick={() => deleteCard(selectedCard.id)}>삭제</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  // ─── List Screen ───
  return (
    <div style={{ maxWidth: 640, margin: '0 auto', padding: 16, paddingBottom: 80 }}>
      {/* Header */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
        <h1 style={{ fontSize: 22, fontWeight: 800 }}>🃏 My TCG</h1>
        <div style={{ display: 'flex', gap: 6 }}>
          <button className="btn btn-outline" style={{ padding: '8px 10px', fontSize: 13 }} onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')} title="테마 전환">

          </button>

          <button className="btn btn-outline" style={{ padding: '8px 10px', fontSize: 13 }} onClick={doSync} title="클라우드 동기화">

          </button>
          <button className="btn btn-outline" style={{ padding: '8px 10px', fontSize: 13 }} onClick={() => setScreen('sync')} title="동기화 설정">⚙️</button>
          <button className="btn btn-outline" style={{ padding: '8px 10px', fontSize: 13 }} onClick={() => setShowExport(true)}>📁</button>

        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 8, marginBottom: 16 }}>

        </div>

          <div style={{ fontSize: 11, color: '#94a3b8' }}>수익률</div>

            {st.emoji} {st.label} {st.value === 'owned' ? stats.ownedCount : st.value === 'wishlist' ? stats.wishlistCount : stats.soldCount}

      </div>

      {/* Search & Sort */}
      <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>

      <div style={{ display: 'flex', gap: 6, marginBottom: 16, alignItems: 'center' }}>
        <button onClick={() => { setBatchMode(!batchMode); setSelectedIds(new Set()); }} className={`btn ${batchMode ? 'btn-primary' : 'btn-outline'}`} style={{ padding: '6px 12px', fontSize: 12 }}>

// ─── OCR: extract card name from top portion ───
async function ocrCardName(photoDataUrl) {
  try {
    // Crop top 30% of image for name extraction
    const img = new Image();
    await new Promise((resolve, reject) => { img.onload = resolve; img.onerror = reject; img.src = photoDataUrl; });
    const cropH = Math.round(img.height * 0.30);
    const canvas = document.createElement('canvas');
    canvas.width = img.width; canvas.height = cropH;
    const ctx = canvas.getContext('2d');
    // White background + high contrast
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, img.width, cropH, 0, 0, canvas.width, canvas.height);
    // Increase contrast
    const idata = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const d = idata.data;
    for (let i = 0; i < d.length; i += 4) {
      const avg = (d[i] + d[i+1] + d[i+2]) / 3;
      const v = avg > 140 ? 255 : 0;
      d[i] = d[i+1] = d[i+2] = v;
    }
    ctx.putImageData(idata, 0, 0);
    const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
    const result = await Tesseract.recognize(blob, 'eng+jpn+kor', { logger: () => {} });
    const text = (result.data.text || '').trim();
    // Clean: take first meaningful line, remove noise
    const lines = text.split('\n').map(l => l.trim()).filter(l => l.length >= 2);
    return lines[0] || '';
  } catch (e) {
    console.warn('OCR failed:', e);
    return '';
  }
}

// ─── Photo Cropper (resizable crop frame) ───
const CROP_RATIOS = [
  { label: '세로', icon: '▯', ratio: 63 / 88 },
  { label: '가로', icon: '▭', ratio: 88 / 63 },
  { label: '정방', icon: '⬜', ratio: 1 },
  { label: '자유', icon: '⊡', ratio: 0 },
];
const MIN_CROP = 50; // minimum crop box size
const HANDLE_SIZE = 22; // touch-friendly handle hit area

function PhotoCropper({ src, onCrop, onCancel }) {
  const [ratioIdx, setRatioIdx] = useState(0);
  const RATIO = CROP_RATIOS[ratioIdx].ratio;
  const containerRef = useRef(null);
  const imgRef = useRef(null);
  const [imgLoaded, setImgLoaded] = useState(false);
  const [scale, setScale] = useState(1);
  const [pos, setPos] = useState({ x: 0, y: 0 });
  const [cropBox, setCropBox] = useState({ x: 0, y: 0, w: 0, h: 0 });

  // Interaction state: 'none' | 'pan' (move image) | 'move' (move crop box) | 'resize-XX'
  const interRef = useRef({ type: 'none', startX: 0, startY: 0, origBox: null, origPos: null });
  const pinchRef = useRef({ active: false, startDist: 0, startScale: 1 });

  function initCropBox(rIdx, cw, ch) {
    const r = CROP_RATIOS[rIdx].ratio;
    let boxW, boxH;
    if (r === 0) {
      boxW = cw * 0.7; boxH = ch * 0.7;
    } else if (r >= 1) {
      boxW = Math.min(cw * 0.85, ch * 0.7 * r);
      boxH = boxW / r;
    } else {
      boxH = Math.min(ch * 0.85, (cw * 0.7) / r);
      boxW = boxH * r;
    }
    return { x: (cw - boxW) / 2, y: (ch - boxH) / 2, w: boxW, h: boxH };
  }

  useEffect(() => {
    if (!imgLoaded || !containerRef.current) return;
    requestAnimationFrame(() => {
      if (!containerRef.current) return;
      const cw = containerRef.current.clientWidth;
      const ch = containerRef.current.clientHeight;
      setCropBox(initCropBox(ratioIdx, cw, ch));
      const img = imgRef.current;
      const iw = img.naturalWidth, ih = img.naturalHeight;
      const fitScale = Math.max((cw * 0.7) / iw, (ch * 0.7) / ih) * 1.05;
      setScale(fitScale);
      setPos({ x: (cw - iw * fitScale) / 2, y: (ch - ih * fitScale) / 2 });
    });
  }, [imgLoaded]);

  function switchRatio(newIdx) {
    setRatioIdx(newIdx);
    if (containerRef.current) {
      const cw = containerRef.current.clientWidth;
      const ch = containerRef.current.clientHeight;
      setCropBox(initCropBox(newIdx, cw, ch));
    }
  }

  function zoomAtCenter(newScale) {
    newScale = Math.max(0.1, Math.min(5, newScale));
    const cx = cropBox.x + cropBox.w / 2;
    const cy = cropBox.y + cropBox.h / 2;
    const ix = (cx - pos.x) / scale;
    const iy = (cy - pos.y) / scale;
    setScale(newScale);
    setPos({ x: cx - ix * newScale, y: cy - iy * newScale });
  }

  function handleWheel(e) {
    e.preventDefault();
    zoomAtCenter(scale - e.deltaY * 0.001);
  }

  // Detect which handle/zone the pointer hits
  function detectZone(cx, cy) {
    const b = cropBox;
    const H = HANDLE_SIZE;
    const inX = cx >= b.x - H && cx <= b.x + b.w + H;
    const inY = cy >= b.y - H && cy <= b.y + b.h + H;
    if (!inX || !inY) return 'pan';

    const nearL = Math.abs(cx - b.x) < H;
    const nearR = Math.abs(cx - (b.x + b.w)) < H;
    const nearT = Math.abs(cy - b.y) < H;
    const nearB = Math.abs(cy - (b.y + b.h)) < H;

    if (nearT && nearL) return 'resize-tl';
    if (nearT && nearR) return 'resize-tr';
    if (nearB && nearL) return 'resize-bl';
    if (nearB && nearR) return 'resize-br';
    if (nearT) return 'resize-t';
    if (nearB) return 'resize-b';
    if (nearL) return 'resize-l';
    if (nearR) return 'resize-r';

    if (cx >= b.x && cx <= b.x + b.w && cy >= b.y && cy <= b.y + b.h) return 'move';
    return 'pan';
  }

  function clampBox(box) {
    if (!containerRef.current) return box;
    const cw = containerRef.current.clientWidth;
    const ch = containerRef.current.clientHeight;
    let { x, y, w, h } = box;
    w = Math.max(MIN_CROP, w);
    h = Math.max(MIN_CROP, h);
    x = Math.max(0, Math.min(cw - w, x));
    y = Math.max(0, Math.min(ch - h, y));
    return { x, y, w, h };
  }

  function applyResize(zone, dx, dy, orig) {
    let { x, y, w, h } = orig;
    const r = RATIO;
    switch (zone) {
      case 'resize-br': w += dx; h += dy; break;
      case 'resize-bl': x += dx; w -= dx; h += dy; break;
      case 'resize-tr': w += dx; y += dy; h -= dy; break;
      case 'resize-tl': x += dx; w -= dx; y += dy; h -= dy; break;
      case 'resize-r': w += dx; break;
      case 'resize-l': x += dx; w -= dx; break;
      case 'resize-b': h += dy; break;
      case 'resize-t': y += dy; h -= dy; break;
    }
    if (w < MIN_CROP) { if (zone.includes('l')) x -= (MIN_CROP - w); w = MIN_CROP; }
    if (h < MIN_CROP) { if (zone.includes('t')) y -= (MIN_CROP - h); h = MIN_CROP; }
    // Enforce aspect ratio if locked
    if (r > 0) {
      if (zone.includes('r') || zone.includes('l')) {
        h = w / r;
        if (zone.includes('t')) y = orig.y + orig.h - h;
      } else {
        w = h * r;
        if (zone.includes('l')) x = orig.x + orig.w - w;
      }
    }
    return clampBox({ x, y, w, h });
  }

  function startInteraction(cx, cy) {
    const rect = containerRef.current?.getBoundingClientRect();
    if (!rect) return;
    const lx = cx - rect.left, ly = cy - rect.top;
    const zone = detectZone(lx, ly);
    interRef.current = { type: zone, startX: cx, startY: cy, origBox: { ...cropBox }, origPos: { ...pos } };
  }

  function moveInteraction(cx, cy) {
    const inter = interRef.current;
    if (inter.type === 'none') return;
    const dx = cx - inter.startX;
    const dy = cy - inter.startY;
    if (inter.type === 'pan') {
      setPos({ x: inter.origPos.x + dx, y: inter.origPos.y + dy });
    } else if (inter.type === 'move') {
      setCropBox(clampBox({ ...inter.origBox, x: inter.origBox.x + dx, y: inter.origBox.y + dy }));
    } else if (inter.type.startsWith('resize-')) {
      setCropBox(applyResize(inter.type, dx, dy, inter.origBox));
    }
  }

  function endInteraction() { interRef.current = { type: 'none', startX: 0, startY: 0, origBox: null, origPos: null }; }

  function getTouchDist(t) { return Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY); }

  function handleMouseDown(e) { e.preventDefault(); startInteraction(e.clientX, e.clientY); }
  function handleMouseMove(e) { moveInteraction(e.clientX, e.clientY); }
  function handleMouseUp() { endInteraction(); }
  function handleTouchStart(e) {
    if (e.touches.length === 2) {
      pinchRef.current = { active: true, startDist: getTouchDist(e.touches), startScale: scale };
      endInteraction();
    } else if (e.touches.length === 1 && !pinchRef.current.active) {
      startInteraction(e.touches[0].clientX, e.touches[0].clientY);
    }
  }
  function handleTouchMove(e) {
    e.preventDefault();
    if (e.touches.length === 2 && pinchRef.current.active) {
      const dist = getTouchDist(e.touches);
      zoomAtCenter(pinchRef.current.startScale * (dist / pinchRef.current.startDist));
    } else if (e.touches.length === 1 && !pinchRef.current.active) {
      moveInteraction(e.touches[0].clientX, e.touches[0].clientY);
    }
  }
  function handleTouchEnd(e) {
    if (e.touches.length < 2) pinchRef.current.active = false;
    if (e.touches.length === 0) endInteraction();
  }

  function doCrop() {
    const img = imgRef.current;
    if (!img) return;
    const sx = (cropBox.x - pos.x) / scale;
    const sy = (cropBox.y - pos.y) / scale;
    const sw = cropBox.w / scale;
    const sh = cropBox.h / scale;
    const outW = Math.min(800, Math.round(sw));
    const outH = Math.round(outW / (cropBox.w / cropBox.h));
    const canvas = document.createElement('canvas');
    canvas.width = outW; canvas.height = outH;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, sx, sy, sw, sh, 0, 0, outW, outH);
    onCrop(canvas.toDataURL('image/jpeg', 0.85));
  }

  // Corner/edge handle dots
  function Handle({ x, y, cursor }) {
    return <div style={{ position: 'absolute', left: x - 8, top: y - 8, width: 16, height: 16, borderRadius: 4, background: 'rgba(99,102,241,0.9)', border: '2px solid white', pointerEvents: 'none', cursor }} />;
  }

  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 9999, background: 'rgba(0,0,0,0.95)', display: 'flex', flexDirection: 'column' }}>
      <div style={{ padding: '12px 16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <button onClick={onCancel} style={{ background: 'none', border: 'none', color: '#94a3b8', fontSize: 15, cursor: 'pointer' }}>✕ 취소</button>
        <span style={{ color: '#e2e8f0', fontSize: 14, fontWeight: 600 }}>사진 자르기</span>
        <button onClick={doCrop} style={{ background: '#6366f1', border: 'none', color: 'white', padding: '8px 16px', borderRadius: 8, fontSize: 14, cursor: 'pointer', fontWeight: 600 }}>✂️ 자르기</button>
      </div>
      <div style={{ padding: '0 16px 4px', display: 'flex', justifyContent: 'center', gap: 6 }}>
        {CROP_RATIOS.map((r, i) => (
          <button key={r.label} onClick={() => switchRatio(i)}
            style={{ background: i === ratioIdx ? '#6366f1' : '#334155', border: 'none', color: i === ratioIdx ? 'white' : '#94a3b8', padding: '6px 12px', borderRadius: 6, fontSize: 12, cursor: 'pointer', fontWeight: i === ratioIdx ? 700 : 400 }}>
            {r.icon} {r.label}
          </button>
        ))}
      </div>
      <div style={{ padding: '4px 16px 4px', display: 'flex', justifyContent: 'center', alignItems: 'center', gap: 8 }}>
        <button onClick={() => zoomAtCenter(scale - 0.1)} style={{ background: '#334155', border: 'none', color: 'white', width: 36, height: 36, borderRadius: 8, fontSize: 18, cursor: 'pointer', fontWeight: 700 }}>−</button>
        <span style={{ color: '#e2e8f0', fontSize: 14, fontWeight: 600, minWidth: 48, textAlign: 'center' }}>{Math.round(scale * 100)}%</span>
        <button onClick={() => zoomAtCenter(scale + 0.1)} style={{ background: '#334155', border: 'none', color: 'white', width: 36, height: 36, borderRadius: 8, fontSize: 18, cursor: 'pointer', fontWeight: 700 }}>+</button>
      </div>
      <div style={{ padding: '0 16px 6px', textAlign: 'center' }}>
        <span style={{ fontSize: 11, color: '#64748b' }}>🔲 프레임: 모서리/변 드래그로 크기 조절 · 안쪽 드래그로 이동 · 바깥 드래그로 사진 이동</span>
      </div>
      <div ref={containerRef} style={{ flex: 1, position: 'relative', overflow: 'hidden', touchAction: 'none', cursor: 'crosshair' }}
        onMouseDown={handleMouseDown} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp}
        onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}
        onWheel={handleWheel}>
        <img ref={imgRef} src={src} onLoad={() => setImgLoaded(true)}
          style={{ position: 'absolute', left: pos.x, top: pos.y, width: imgRef.current ? imgRef.current.naturalWidth * scale : 'auto', height: imgRef.current ? imgRef.current.naturalHeight * scale : 'auto', pointerEvents: 'none', userSelect: 'none' }} draggable={false} />
        {imgLoaded && <>
          <div style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.6)', clipPath: `polygon(0 0, 100% 0, 100% 100%, 0 100%, 0 0, ${cropBox.x}px ${cropBox.y}px, ${cropBox.x}px ${cropBox.y + cropBox.h}px, ${cropBox.x + cropBox.w}px ${cropBox.y + cropBox.h}px, ${cropBox.x + cropBox.w}px ${cropBox.y}px, ${cropBox.x}px ${cropBox.y}px)`, pointerEvents: 'none' }} />
          <div style={{ position: 'absolute', left: cropBox.x, top: cropBox.y, width: cropBox.w, height: cropBox.h, border: '2px solid rgba(255,255,255,0.8)', borderRadius: 4, pointerEvents: 'none', boxShadow: '0 0 0 1px rgba(0,0,0,0.3)' }}>
            <div style={{ position: 'absolute', top: '33.3%', left: 0, right: 0, borderTop: '1px solid rgba(255,255,255,0.2)' }} />
            <div style={{ position: 'absolute', top: '66.6%', left: 0, right: 0, borderTop: '1px solid rgba(255,255,255,0.2)' }} />
            <div style={{ position: 'absolute', left: '33.3%', top: 0, bottom: 0, borderLeft: '1px solid rgba(255,255,255,0.2)' }} />
            <div style={{ position: 'absolute', left: '66.6%', top: 0, bottom: 0, borderLeft: '1px solid rgba(255,255,255,0.2)' }} />
          </div>
          {/* Resize handles: 4 corners + 4 edges */}
          <Handle x={cropBox.x} y={cropBox.y} cursor="nw-resize" />
          <Handle x={cropBox.x + cropBox.w} y={cropBox.y} cursor="ne-resize" />
          <Handle x={cropBox.x} y={cropBox.y + cropBox.h} cursor="sw-resize" />
          <Handle x={cropBox.x + cropBox.w} y={cropBox.y + cropBox.h} cursor="se-resize" />
          <Handle x={cropBox.x + cropBox.w / 2} y={cropBox.y} cursor="n-resize" />
          <Handle x={cropBox.x + cropBox.w / 2} y={cropBox.y + cropBox.h} cursor="s-resize" />
          <Handle x={cropBox.x} y={cropBox.y + cropBox.h / 2} cursor="w-resize" />
          <Handle x={cropBox.x + cropBox.w} y={cropBox.y + cropBox.h / 2} cursor="e-resize" />
          {/* Size indicator */}
          <div style={{ position: 'absolute', left: cropBox.x + cropBox.w / 2, top: cropBox.y + cropBox.h + 12, transform: 'translateX(-50%)', background: 'rgba(0,0,0,0.7)', color: '#94a3b8', padding: '2px 8px', borderRadius: 4, fontSize: 10, pointerEvents: 'none', whiteSpace: 'nowrap' }}>
            {Math.round(cropBox.w / scale)} × {Math.round(cropBox.h / scale)}px
          </div>
        </>}
      </div>
    </div>
  );
}

  const [cropSrc, setCropSrc] = useState(null);
  const [ocrStatus, setOcrStatus] = useState(''); // '', 'loading', 'done'
  const [ocrSuggestion, setOcrSuggestion] = useState('');
  const fileRef = useRef(null);

  async function handleCropDone(result) {
    setPhoto(result);
    setCropSrc(null);
    if (!name.trim()) {
      setOcrStatus('loading');
      setOcrSuggestion('');
      const extracted = await ocrCardName(result);
      setOcrStatus('done');
      if (extracted) {
        setOcrSuggestion(extracted);
      }
    }
  }

  function handlePhoto(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { alert('5MB 이하의 이미지만 가능합니다.'); return; }
    const reader = new FileReader();
    reader.onload = (ev) => setCropSrc(ev.target.result);
    reader.readAsDataURL(file);
    e.target.value = '';
  }

  function handleSubmit(e) {
    e.preventDefault();
    if (!name.trim()) { alert('카드 이름을 입력해주세요.'); return; }
    const data = {
      ...(card || {}),
      name: name.trim(),
      category,
      status,
      grade: buildGrade(gradeCompany, gradeScore),
      purchaseDate,
      price: price ? parseInt(price.replace(/[^0-9]/g, '')) : 0,
      currentValue: currentValue ? parseInt(currentValue.replace(/[^0-9]/g, '')) : 0,
      soldPrice: status === 'sold' && soldPrice ? parseInt(soldPrice.replace(/[^0-9]/g, '')) : 0,
      soldDate: status === 'sold' ? soldDate : '',
      seller: seller.trim(),
      memo: memo.trim(),
      photo,
    };
    onSave(data);
  }

  function handlePriceInput(val) {
    const num = val.replace(/[^0-9]/g, '');
    setPrice(num);
  }

  return (
    <div style={{ maxWidth: 500, margin: '0 auto', padding: 16 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
        <button onClick={onCancel} className="text-gray-400" style={{ background: 'none', border: 'none', fontSize: 15, cursor: 'pointer', color: '#94a3b8' }}>← 취소</button>
        <h2 style={{ fontSize: 18, fontWeight: 700 }}>{card ? '카드 수정' : '카드 등록'}</h2>
        <div style={{ width: 50 }}></div>
      </div>

      {/* Photo Cropper Modal - outside form to avoid submit */}
      {cropSrc && <PhotoCropper src={cropSrc} onCrop={handleCropDone} onCancel={() => setCropSrc(null)} />}

      <form onSubmit={handleSubmit}>
        {/* Photo */}
        <div style={{ marginBottom: 16, textAlign: 'center' }}>
          {photo ? (
            <div style={{ position: 'relative', display: 'inline-block' }}>
              <img src={photo} alt="preview" style={{ maxHeight: 200, borderRadius: 12 }} />
              <button type="button" onClick={() => setPhoto('')} style={{ position: 'absolute', top: 4, right: 4, background: 'rgba(0,0,0,0.6)', color: 'white', border: 'none', borderRadius: '50%', width: 28, height: 28, cursor: 'pointer', fontSize: 14 }}>✕</button>
              <button type="button" onClick={() => fileRef.current?.click()} style={{ position: 'absolute', bottom: 4, right: 4, background: 'rgba(0,0,0,0.6)', color: 'white', border: 'none', borderRadius: 6, padding: '4px 8px', cursor: 'pointer', fontSize: 11 }}>✂️ 다시</button>
            </div>
          ) : (
            <div onClick={() => fileRef.current?.click()} style={{ background: '#1e293b', border: '2px dashed #334155', borderRadius: 12, padding: '30px 20px', cursor: 'pointer' }}>
              <div style={{ fontSize: 36, marginBottom: 8 }}>📷</div>
              <div style={{ fontSize: 13, color: '#64748b' }}>탭하여 사진 추가</div>
            </div>
          )}
          <input ref={fileRef} type="file" accept="image/*" onChange={handlePhoto} style={{ display: 'none' }} />
        </div>

        {/* Name */}
        <div className="form-field">
          <label>카드 이름 *</label>
          <input type="text" value={name} onChange={e => { setName(e.target.value); setOcrSuggestion(''); }} placeholder="예: 리자몽 VMAX HR" autoFocus />
          {ocrStatus === 'loading' && (
            <div style={{ fontSize: 12, color: '#6366f1', marginTop: 4 }}>🔍 카드명 인식 중...</div>
          )}
          {ocrSuggestion && (
            <button type="button" onClick={() => { setName(ocrSuggestion); setOcrSuggestion(''); }}
              style={{ marginTop: 6, background: 'rgba(99,102,241,0.15)', border: '1px solid #6366f1', borderRadius: 8, padding: '8px 12px', color: '#a5b4fc', fontSize: 13, cursor: 'pointer', width: '100%', textAlign: 'left' }}>
              💡 인식 결과: <strong style={{ color: '#e2e8f0' }}>{ocrSuggestion}</strong><span style={{ float: 'right', fontSize: 11 }}>탭하여 적용</span>
            </button>
          )}
        </div>

        {/* Category */}
        <div className="form-field">
          <label>카테고리</label>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 8 }}>
            {CATEGORIES.map(cat => (
              <button key={cat.value} type="button" onClick={() => setCategory(cat.value)}
                style={{ padding: '10px 4px', borderRadius: 8, border: category === cat.value ? '2px solid #6366f1' : '1px solid #334155', background: category === cat.value ? 'rgba(99,102,241,0.15)' : '#1e293b', cursor: 'pointer', textAlign: 'center', fontSize: 13, color: '#e2e8f0', minHeight: 44 }}>
                {cat.emoji}<br/><span style={{ fontSize: 11 }}>{cat.label}</span>
              </button>
            ))}
          </div>
        </div>

        {/* Status */}
        <div className="form-field">
          <label>상태</label>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8 }}>
            {CARD_STATUSES.map(st => (
              <button key={st.value} type="button" onClick={() => setStatus(st.value)}
                style={{ padding: '10px 4px', borderRadius: 8, border: status === st.value ? `2px solid ${st.color}` : '1px solid #334155', background: status === st.value ? `${st.color}22` : '#1e293b', cursor: 'pointer', textAlign: 'center', fontSize: 13, color: '#e2e8f0', minHeight: 44 }}>
                {st.emoji}<br/><span style={{ fontSize: 11 }}>{st.label}</span>
              </button>
            ))}
          </div>
        </div>

        {/* Grade */}
        <div className="form-field">
          <label>등급</label>
          <div className="form-row">
            <div>
              <select value={gradeCompany} onChange={e => { setGradeCompany(e.target.value); if (e.target.value === 'RAW카드' || e.target.value === '') setGradeScore(''); }}>
                <option value="">등급사 선택</option>
                {GRADE_COMPANIES.map(c => <option key={c} value={c}>{c}</option>)}
                <option value="RAW카드">RAW카드</option>
              </select>
            </div>
            {gradeCompany && gradeCompany !== 'RAW카드' && (
              <div>
                <select value={gradeScore} onChange={e => setGradeScore(e.target.value)}>
                  <option value="">점수 선택</option>
                  {GRADE_SCORES.map(s => <option key={s} value={s}>{s}점</option>)}
                </select>
              </div>
            )}
          </div>
        </div>

        {/* Date & Price */}
        <div className="form-field">
          <div className="form-row">
            <div>
              <label>구매일</label>
              <input type="date" value={purchaseDate} onChange={e => setPurchaseDate(e.target.value)} />
            </div>
            <div>
              <label>구매가 (원)</label>
              <input type="text" inputMode="numeric" value={price ? Number(price).toLocaleString('ko-KR') : ''} onChange={e => handlePriceInput(e.target.value)} placeholder="0" />
            </div>
          </div>
        </div>

        {/* Seller */}
        <div className="form-field">
          <label>구매처</label>
          <input type="text" value={seller} onChange={e => setSeller(e.target.value)} placeholder="예: 번개장터, 카드샵, 해외직구..." />
        </div>

        {/* Current Value */}
        {status === 'owned' && (
          <div className="form-field">
            <label>현재 시세 (원) — 선택사항</label>
            <input type="text" inputMode="numeric" value={currentValue ? Number(currentValue).toLocaleString('ko-KR') : ''} onChange={e => setCurrentValue(e.target.value.replace(/[^0-9]/g, ''))} placeholder="현재 시세 입력 (선택)" />
            {name.trim() && (
              <div style={{ marginTop: 6 }}>
                <div style={{ fontSize: 11, color: '#64748b', marginBottom: 4 }}>시세 조회 후 입력하세요 👇</div>
                <PriceLookupButtons name={name} category={category} compact />
              </div>
            )}
          </div>
        )}

        {/* Sold Info */}
        {status === 'sold' && (
          <div className="form-field">
            <div className="form-row">
              <div>
                <label>판매가 (원)</label>
                <input type="text" inputMode="numeric" value={soldPrice ? Number(soldPrice).toLocaleString('ko-KR') : ''} onChange={e => setSoldPrice(e.target.value.replace(/[^0-9]/g, ''))} placeholder="0" />
              </div>
              <div>
                <label>판매일</label>
                <input type="date" value={soldDate} onChange={e => setSoldDate(e.target.value)} />
              </div>
            </div>
          </div>
        )}

        {/* Memo */}
        <div className="form-field" style={{ marginBottom: 24 }}>
          <label>메모</label>
          <textarea value={memo} onChange={e => setMemo(e.target.value)} placeholder="특이사항, 컨디션 등..." rows={3} style={{ resize: 'vertical' }} />
        </div>

        <button type="submit" className="btn btn-primary" style={{ width: '100%', padding: 14, fontSize: 16 }}>
          {card ? '✏️ 수정 완료' : '✅ 등록하기'}
        </button>
      </form>
    </div>
  );
}


// ─── v31: Dashboard ───
function Dashboard({ cards, stats, onClose, theme }) {
  // Category distribution data
  const catData = CATEGORIES.map(cat => ({
    ...cat, count: cards.filter(c => c.category === cat.value).length
  })).filter(d => d.count > 0);
  const total = catData.reduce((s, d) => s + d.count, 0) || 1;
  const catColors = { pokemon: '#fbbf24', sports: '#34d399', yugioh: '#a78bfa', other: '#64748b' };

  // Pie chart arcs
  function polarXY(cx, cy, r, deg) {
    const rad = (deg - 90) * Math.PI / 180;
    return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
  }
  function arcPath(cx, cy, r, startDeg, endDeg) {
    if (endDeg - startDeg >= 359.99) return `M ${cx-r} ${cy} A ${r} ${r} 0 1 1 ${cx+r} ${cy} A ${r} ${r} 0 1 1 ${cx-r} ${cy}`;
    const [sx, sy] = polarXY(cx, cy, r, startDeg);
    const [ex, ey] = polarXY(cx, cy, r, endDeg);
    const large = endDeg - startDeg > 180 ? 1 : 0;
    return `M ${cx} ${cy} L ${sx} ${sy} A ${r} ${r} 0 ${large} 1 ${ex} ${ey} Z`;
  }
  let cumDeg = 0;
  const arcs = catData.map(d => {
    const deg = (d.count / total) * 360;
    const arc = { ...d, startDeg: cumDeg, endDeg: cumDeg + deg };
    cumDeg += deg;
    return arc;
  });

  // Monthly trend (last 6 months)
  const monthData = [];
  const now = new Date();
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    const label = (d.getMonth() + 1) + '월';
    const mc = cards.filter(c => c.purchaseDate && c.purchaseDate.startsWith(key));
    monthData.push({ key, label, count: mc.length, spent: mc.reduce((s, c) => s + (c.price || 0), 0) });
  }
  const maxSpent = Math.max(...monthData.map(m => m.spent), 1);
  const maxCount = Math.max(...monthData.map(m => m.count), 1);

  // Status breakdown
  const owned = cards.filter(c => (c.status || 'owned') === 'owned');
  const wishlist = cards.filter(c => c.status === 'wishlist');
  const sold = cards.filter(c => c.status === 'sold');
  const totalInvest = owned.reduce((s, c) => s + (c.price || 0), 0);
  const totalValue = owned.reduce((s, c) => s + (c.currentValue || c.price || 0), 0);
  const soldRevenue = sold.reduce((s, c) => s + (c.soldPrice || 0), 0);
  const soldCost = sold.reduce((s, c) => s + (c.price || 0), 0);

  return (
    <div style={{ maxWidth: 640, margin: '0 auto', padding: 16, paddingBottom: 40 }} className="anim-fade">
      <button onClick={onClose} style={{ background: 'none', border: 'none', fontSize: 15, cursor: 'pointer', color: '#94a3b8', marginBottom: 16 }}>← 목록으로</button>
      <h2 style={{ fontSize: 20, fontWeight: 800, marginBottom: 20 }}>📊 대시보드</h2>

      {/* Summary row */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 10, marginBottom: 20 }}>
        <div className="stat-card">
          <div style={{ fontSize: 12, color: '#94a3b8' }}>총 카드</div>
          <div style={{ fontSize: 28, fontWeight: 800 }}>{cards.length}<span style={{ fontSize: 13, color: '#64748b' }}>장</span></div>
        </div>
        <div className="stat-card">
          <div style={{ fontSize: 12, color: '#94a3b8' }}>총 투자액</div>
          <div style={{ fontSize: 20, fontWeight: 800, color: '#6366f1' }}>{totalInvest > 0 ? (totalInvest >= 10000 ? Math.floor(totalInvest/10000).toLocaleString()+'만' : totalInvest.toLocaleString()) + '원' : '-'}</div>
        </div>
        <div className="stat-card">
          <div style={{ fontSize: 12, color: '#94a3b8' }}>보유 시세</div>
          <div style={{ fontSize: 20, fontWeight: 800, color: totalValue >= totalInvest ? '#10b981' : '#ef4444' }}>{totalValue > 0 ? (totalValue >= 10000 ? Math.floor(totalValue/10000).toLocaleString()+'만' : totalValue.toLocaleString()) + '원' : '-'}</div>
        </div>
        <div className="stat-card">
          <div style={{ fontSize: 12, color: '#94a3b8' }}>판매 수익</div>
          <div style={{ fontSize: 20, fontWeight: 800, color: soldRevenue >= soldCost ? '#10b981' : '#ef4444' }}>{soldRevenue > 0 ? '+' + (soldRevenue - soldCost >= 10000 ? Math.floor((soldRevenue-soldCost)/10000).toLocaleString()+'만' : (soldRevenue-soldCost).toLocaleString()) + '원' : '-'}</div>
        </div>
      </div>

      {/* Pie Chart */}
      <div className="dash-chart">
        <h3 style={{ fontSize: 16, fontWeight: 700, marginBottom: 12 }}>📁 카테고리 분포</h3>
        <div style={{ display: 'flex', alignItems: 'center', gap: 20, justifyContent: 'center', flexWrap: 'wrap' }}>
          <svg viewBox="0 0 200 200" width="160" height="160">
            {arcs.length > 0 ? arcs.map((a, i) => (
              <path key={i} d={arcPath(100, 100, 85, a.startDeg, a.endDeg)} fill={catColors[a.value]} stroke={theme === 'dark' ? '#0f172a' : '#f1f5f9'} strokeWidth="2" />
            )) : <circle cx="100" cy="100" r="85" fill="#334155"/>}
            <circle cx="100" cy="100" r="45" fill={theme === 'dark' ? '#0f172a' : '#f1f5f9'} />
            <text x="100" y="95" textAnchor="middle" fill={theme === 'dark' ? '#e2e8f0' : '#1e293b'} fontSize="24" fontWeight="800">{cards.length}</text>
            <text x="100" y="115" textAnchor="middle" fill="#94a3b8" fontSize="11">전체</text>
          </svg>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            {catData.map(d => (
              <div key={d.value} style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13 }}>
                <div style={{ width: 12, height: 12, borderRadius: 3, background: catColors[d.value] }}/>
                <span>{d.emoji} {d.label}</span>
                <span style={{ fontWeight: 700 }}>{d.count}장</span>
                <span style={{ color: '#64748b', fontSize: 11 }}>({Math.round(d.count/total*100)}%)</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Monthly trend bar chart */}
      <div className="dash-chart">
        <h3 style={{ fontSize: 16, fontWeight: 700, marginBottom: 12 }}>📈 월별 구매 추이 (최근 6개월)</h3>
        <div style={{ display: 'flex', alignItems: 'flex-end', gap: 6, height: 140, padding: '0 8px' }}>
          {monthData.map(m => (
            <div key={m.key} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
              {m.spent > 0 && <div style={{ fontSize: 9, color: '#94a3b8', marginBottom: 2 }}>{m.spent >= 10000 ? Math.floor(m.spent/10000)+'만' : m.spent.toLocaleString()}</div>}
              <div style={{ width: '100%', maxWidth: 40, height: Math.max(m.spent > 0 ? 8 : 0, (m.spent / maxSpent) * 100), background: 'linear-gradient(to top, #6366f1, #818cf8)', borderRadius: '6px 6px 0 0', transition: 'height 0.5s ease' }}/>
              <div style={{ fontSize: 11, color: '#94a3b8', marginTop: 4 }}>{m.label}</div>
              <div style={{ fontSize: 10, color: '#6366f1', fontWeight: 600 }}>{m.count}장</div>
            </div>
          ))}
        </div>
      </div>

      {/* Status breakdown */}
      <div className="dash-chart">
        <h3 style={{ fontSize: 16, fontWeight: 700, marginBottom: 12 }}>📋 상태별 현황</h3>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8 }}>
          {[
            { label: '보유', count: owned.length, color: '#6366f1', icon: '📦' },
            { label: '위시리스트', count: wishlist.length, color: '#f59e0b', icon: '⭐' },
            { label: '판매완료', count: sold.length, color: '#10b981', icon: '💰' },
          ].map(s => (
            <div key={s.label} style={{ textAlign: 'center', padding: 12, borderRadius: 10, border: '1px solid ' + s.color + '33', background: s.color + '11' }}>
              <div style={{ fontSize: 24 }}>{s.icon}</div>
              <div style={{ fontSize: 22, fontWeight: 800, color: s.color }}>{s.count}</div>
              <div style={{ fontSize: 12, color: '#94a3b8' }}>{s.label}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Top valuable cards */}
      {owned.filter(c => c.currentValue > 0).length > 0 && (
        <div className="dash-chart">
          <h3 style={{ fontSize: 16, fontWeight: 700, marginBottom: 12 }}>💎 가치 TOP 5</h3>
          {owned.filter(c => c.currentValue > 0).sort((a, b) => (b.currentValue || 0) - (a.currentValue || 0)).slice(0, 5).map((c, i) => {
            const cat = CATEGORIES.find(x => x.value === c.category);
            const roi = c.price > 0 ? ((c.currentValue - c.price) / c.price * 100).toFixed(0) : 0;
            return (
              <div key={c.id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 0', borderBottom: '1px solid #334155' }}>
                <span style={{ fontSize: 16, fontWeight: 800, color: '#6366f1', width: 24 }}>{i + 1}</span>
                <span style={{ flex: 1, fontSize: 14, fontWeight: 600 }}>{cat?.emoji} {c.name}</span>
                <span style={{ fontSize: 14, fontWeight: 700, color: '#10b981' }}>{formatPrice(c.currentValue)}</span>
                {roi != 0 && <span style={{ fontSize: 11, color: roi >= 0 ? '#10b981' : '#ef4444', fontWeight: 600 }}>{roi >= 0 ? '+' : ''}{roi}%</span>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── v31: Card Compare View ───
function CompareView({ cards, compareIds, onClose, theme }) {
  const compareCards = compareIds.map(id => cards.find(c => c.id === id)).filter(Boolean);

  if (compareCards.length < 2) {
    return (
      <div style={{ maxWidth: 640, margin: '0 auto', padding: 16, textAlign: 'center' }} className="anim-fade">
        <button onClick={onClose} style={{ background: 'none', border: 'none', fontSize: 15, cursor: 'pointer', color: '#94a3b8', marginBottom: 16 }}>← 돌아가기</button>
        <div className="empty-state">
          <div style={{ fontSize: 64, marginBottom: 16 }}>⚖️</div>
          <p>비교할 카드를 2장 이상 선택해주세요</p>
          <p style={{ fontSize: 13, color: '#64748b', marginTop: 8 }}>카드 목록에서 좌상단 + 버튼으로 비교 카드를 추가할 수 있어요</p>
        </div>
      </div>
    );
  }

  const fields = [
    { key: 'category', label: '카테고리', render: c => { const cat = CATEGORIES.find(x => x.value === c.category); return cat ? cat.emoji + ' ' + cat.label : c.category; }},
    { key: 'grade', label: '등급', render: c => c.grade || '-' },
    { key: 'status', label: '상태', render: c => { const st = CARD_STATUSES.find(s => s.value === (c.status || 'owned')); return st ? st.emoji + ' ' + st.label : '-'; }},
    { key: 'price', label: '구매가', render: c => formatPrice(c.price) },
    { key: 'currentValue', label: '현재 시세', render: c => c.currentValue ? formatPrice(c.currentValue) : '-' },
    { key: 'roi', label: '수익률', render: c => c.price > 0 && c.currentValue ? ((c.currentValue - c.price) / c.price * 100).toFixed(1) + '%' : '-' },
    { key: 'purchaseDate', label: '구매일', render: c => formatDate(c.purchaseDate) },
    { key: 'seller', label: '구매처', render: c => c.seller || '-' },
  ];

  // Find best values for highlighting
  const bestPrice = Math.min(...compareCards.map(c => c.price || Infinity));
  const bestValue = Math.max(...compareCards.map(c => c.currentValue || 0));

  return (
    <div style={{ maxWidth: 800, margin: '0 auto', padding: 16, paddingBottom: 40 }} className="anim-fade">
      <button onClick={onClose} style={{ background: 'none', border: 'none', fontSize: 15, cursor: 'pointer', color: '#94a3b8', marginBottom: 16 }}>← 돌아가기</button>
      <h2 style={{ fontSize: 20, fontWeight: 800, marginBottom: 20 }}>⚖️ 카드 비교 ({compareCards.length}장)</h2>

      {/* Photo row */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(' + compareCards.length + ', 1fr)', gap: 12, marginBottom: 20 }}>
        {compareCards.map(card => {
          const cat = CATEGORIES.find(x => x.value === card.category);
          return (
            <div key={card.id} style={{ textAlign: 'center' }}>
              {card.photo ? (
                <img src={card.photo} alt={card.name} style={{ width: '100%', aspectRatio: '3/4', objectFit: 'cover', borderRadius: 12, border: '2px solid #334155' }} />
              ) : (
                <div className="card-noimg" style={{ borderRadius: 12, fontSize: 48 }}>{cat ? cat.emoji : '🎴'}</div>
              )}
              <div style={{ fontSize: 14, fontWeight: 700, marginTop: 8, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{card.name}</div>
            </div>
          );
        })}
      </div>

      {/* Comparison table */}
      <div style={{ borderRadius: 12, overflow: 'hidden', border: '1px solid #334155' }}>
        {fields.map((field, fi) => (
          <div key={field.key} style={{ display: 'grid', gridTemplateColumns: '100px repeat(' + compareCards.length + ', 1fr)', borderBottom: fi < fields.length - 1 ? '1px solid #334155' : 'none' }}>
            <div style={{ padding: '10px 12px', fontSize: 12, color: '#94a3b8', fontWeight: 600, background: theme === 'dark' ? '#0f172a' : '#f1f5f9' }}>{field.label}</div>
            {compareCards.map(card => {
              const val = field.render(card);
              let highlight = false;
              if (field.key === 'price' && card.price === bestPrice && bestPrice < Infinity) highlight = true;
              if (field.key === 'currentValue' && card.currentValue === bestValue && bestValue > 0) highlight = true;
              return (
                <div key={card.id} style={{ padding: '10px 12px', fontSize: 13, fontWeight: highlight ? 700 : 400, color: highlight ? '#10b981' : undefined, background: theme === 'dark' ? '#1e293b' : '#fff', borderLeft: '1px solid #334155' }}>
                  {val} {highlight && '👑'}
                </div>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
}

function SyncScreen({ onBack, onSync, onPush, onPull, onRestore, cardCount }) {
  const [cfg, setCfg] = useState(getSyncConfig() || { token: '', gistId: '' });
  const [status, setStatus] = useState('');

  async function handleSave() {
    if (!cfg.token.trim()) { alert('GitHub 토큰을 입력해주세요.'); return; }
    setStatus('연결 중...');
    try {
      const token = cfg.token.trim();
      const existing = await findGist(token);
      let gistId = existing ? existing.id : null;
      if (!gistId) {
        // Create new gist
        const created = await createGist(token, { cards: [], lastSync: Date.now() });
        gistId = created.id;
      }
      const newCfg = { token, gistId };
      saveSyncConfig(newCfg);
      setCfg(newCfg);
      setStatus('✅ 연결 성공! 동기화 중...');
      // Auto-sync immediately
      await onSync();
      setStatus('✅ 동기화 완료!');
    } catch(e) {
      setStatus('❌ 토큰이 올바르지 않거나 네트워크 오류입니다.');
    }
  }

  function handleDisconnect() {
    saveSyncConfig(null);
    setCfg({ token: '', gistId: '' });
    setStatus('연결 해제됨');
  }

  return (
    <div style={{ maxWidth: 500, margin: '0 auto', padding: 16 }}>
      <button onClick={onBack} style={{ background: 'none', border: 'none', fontSize: 15, cursor: 'pointer', color: '#94a3b8', marginBottom: 16 }}>← 돌아가기</button>
      <h2 style={{ fontSize: 20, fontWeight: 700, marginBottom: 20 }}>☁️ 클라우드 동기화</h2>
      
      <div style={{ background: '#1e293b', borderRadius: 12, padding: 16, marginBottom: 16, border: '1px solid #334155' }}>
        <p style={{ fontSize: 13, color: '#94a3b8', marginBottom: 12, lineHeight: 1.6 }}>
          GitHub Gist를 통해 여러 기기에서 카드 데이터를 동기화합니다.<br/>
          <span style={{ color: '#34d399' }}>※ 사진도 축소 버전으로 동기화됩니다 (원본은 기기별 로컬 저장)</span>
        </p>
        
        <label style={{ fontSize: 13, color: '#94a3b8', marginBottom: 4, display: 'block' }}>GitHub Personal Access Token (gist 권한)</label>
        <input type="password" value={cfg.token} onChange={e => setCfg(prev => ({ ...prev, token: e.target.value }))} placeholder="ghp_xxxxxxxxxxxx" style={{ marginBottom: 12 }} />
        
        <div style={{ display: 'flex', gap: 8 }}>
          <button className="btn btn-primary" style={{ flex: 1 }} onClick={handleSave}>연결</button>
          {cfg.token && <button className="btn btn-outline" onClick={handleDisconnect}>해제</button>}
        </div>
        
        {status && <p style={{ fontSize: 13, marginTop: 8, color: status.includes('❌') ? '#ef4444' : '#34d399' }}>{status}</p>}
      </div>

      {cfg.gistId && (
        <div style={{ marginBottom: 12 }}>
          <div style={{ fontSize: 13, color: '#34d399', marginBottom: 8 }}>✅ Gist 연결됨 (ID: {cfg.gistId.slice(0, 8)}...)</div>
          <div style={{ fontSize: 12, color: '#94a3b8', marginBottom: 8 }}>📱 이 기기 카드: {cardCount}장</div>
          <button className="btn btn-primary" style={{ width: '100%', padding: 14, fontSize: 16, marginBottom: 8 }} onClick={async () => { setStatus('동기화 중...'); await onSync(); setStatus('✅ 동기화 완료!'); }}>
            🔄 지금 동기화
          </button>
          <div style={{ display: 'flex', gap: 8, marginBottom: 8 }}>
            <button className="btn btn-outline" style={{ flex: 1, padding: 10, fontSize: 13 }} onClick={async () => { setStatus('⬆️ 업로드 중...'); await onPush(); setStatus('✅ 이 기기 → 클라우드 완료!'); }}>
              ⬆️ 이 기기→클라우드
            </button>
            <button className="btn btn-outline" style={{ flex: 1, padding: 10, fontSize: 13 }} onClick={async () => { setStatus('⬇️ 다운로드 중...'); await onPull(); setStatus('✅ 클라우드→이 기기 완료!'); }}>
              ⬇️ 클라우드→이 기기
            </button>
          </div>
          <button className="btn btn-outline" style={{ width: '100%', padding: 10, fontSize: 13, color: '#f59e0b' }} onClick={async () => {
            setStatus('📜 히스토리 로딩...');
            try {
              const h = await getGistHistory(cfg.token, cfg.gistId);
              const items = [];
              for (const rev of h) {
                try {
                  const data = await readGistVersion(cfg.token, cfg.gistId, rev.version);
                  const count = data?.cards?.length || 0;
                  const pokemonCount = (data?.cards || []).filter(c => c.category === 'pokemon').length;
                  items.push({ sha: rev.version, date: rev.committed_at, count, pokemonCount, data });
                } catch(e) { /* skip */ }
              }
              if (items.length === 0) { setStatus('히스토리가 없습니다.'); return; }
              const msg = items.map((it, i) => `${i+1}. ${new Date(it.date).toLocaleString('ko-KR')} — 총 ${it.count}장 (포켓몬 ${it.pokemonCount}장)`).join('\n');
              const pick = prompt('복구할 버전 번호를 입력하세요 (뒤에 m 추가시 현재 데이터와 병합, 예: 3m):\n\n' + msg);
              if (pick) {
                const doMerge = pick.toLowerCase().includes('m');
                const idx = parseInt(pick) - 1;
                if (items[idx]) {
                  const chosen = items[idx];
                  const remoteCards = (chosen.data.cards || []).map(c => {
                    const { syncPhoto, ...d } = c;
                    return { ...d, photo: syncPhoto || d.photo || '' };
                  });
                  if (doMerge) {
                    const localCards = JSON.parse(localStorage.getItem('tcg_cards') || '[]');
                    const merged = mergeCards(localCards, remoteCards).sort((a, b) => b.createdAt - a.createdAt);
                    onRestore(merged);
                    setStatus('✅ 병합 복구 완료! 현재 ' + localCards.length + '장 + 히스토리 ' + remoteCards.length + '장 → ' + merged.length + '장');
                  } else {
                    const finalCards = remoteCards.sort((a, b) => b.createdAt - a.createdAt);
                    onRestore(finalCards);
                    setStatus('✅ ' + new Date(chosen.date).toLocaleString('ko-KR') + ' 버전 복구 완료! (' + chosen.count + '장)');
                  }
                } else {
                  setStatus('잘못된 번호입니다');
                }
              } else {
                setStatus('복구 취소됨');
              }
            } catch(e) { setStatus('❌ 히스토리 로딩 실패: ' + e.message); }
          }}>
            📜 클라우드 히스토리에서 복구
          </button>
        </div>
      )}

      {/* Local Backup */}
      <div style={{ background: '#1e293b', borderRadius: 12, padding: 16, marginBottom: 16, border: '1px solid #334155' }}>
        <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 8 }}>💾 로컬 백업</h3>
        <p style={{ fontSize: 12, color: '#94a3b8', marginBottom: 8 }}>동기화 전 자동으로 백업됩니다. 문제 발생 시 복원하세요.</p>
        {(() => {
          const backup = getBackup();
          if (!backup) return <p style={{ fontSize: 12, color: '#64748b' }}>백업 없음</p>;
          return (
            <div>
              <p style={{ fontSize: 12, color: '#94a3b8' }}>백업 시점: {new Date(backup.timestamp).toLocaleString('ko-KR')} ({backup.cards.length}장)</p>
              <button className="btn btn-outline" style={{ marginTop: 8, width: '100%', padding: 10, fontSize: 13 }} onClick={() => {
                if (confirm(`백업 데이터(${backup.cards.length}장)로 복원하시겠습니까? 현재 데이터가 교체됩니다.`)) {
                  onRestore(backup.cards);
                  setStatus('✅ 백업에서 복원 완료!');
                }
              }}>🔄 백업에서 복원</button>
            </div>
          );
        })()}
      </div>

      <div style={{ marginTop: 20, padding: 12, background: '#0f172a', borderRadius: 8, fontSize: 12, color: '#64748b', lineHeight: 1.8 }}>
        <strong>토큰 발급 방법:</strong><br/>
        1. <span style={{ color: '#94a3b8' }}>github.com → Settings → Developer settings → Personal access tokens → Tokens (classic)</span><br/>
        2. <span style={{ color: '#94a3b8' }}>Generate new token → gist 체크 → Generate</span><br/>
        3. 발급된 토큰을 위에 붙여넣기<br/>
        ※ 지후네 일본어랑 같은 토큰 사용 가능
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
// Fallback: if babel transform fails, show error message
window.addEventListener('error', function(e) {
  var root = document.getElementById('root');
  if (root && !root.hasChildNodes()) {
    root.innerHTML = '<div style="padding:40px;color:#f87171;font-family:sans-serif;text-align:center">' +
      '<h2>앱 로딩 오류</h2><p>' + (e.message || '알 수 없는 오류') + '</p>' +
      '<button onclick="caches.keys().then(k=>Promise.all(k.map(c=>caches.delete(c)))).then(()=>location.reload())" ' +
      'style="margin-top:16px;padding:12px 24px;background:#6366f1;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer">' +
      '캐시 삭제 후 새로고침</button></div>';
  }
});
</script>
</body>
</html>
