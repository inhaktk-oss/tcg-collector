// This runs synchronously enough to prevent QuotaExceededError during app init

      var db = req.result;
      var tx = db.transaction('photos', 'readwrite');

        console.log('[EarlyMigration] Moved ' + withPhotos.length + ' photos to IndexedDB');
      };
    };
  } catch(e) {
    console.error('[EarlyMigration] Error:', e);
  }

        'style="margin-top:16px;padding:12px 24px;background:#f59e0b;color:#1e293b;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-weight:700">' +
        '🔧 사진 데이터 복구</button><br>' : '') +
      '<button onclick="caches.keys().then(k=>Promise.all(k.map(c=>caches.delete(c)))).then(()=>location.reload())" ' +
      'style="margin-top:16px;padding:12px 24px;background:#6366f1;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer">' +
      '캐시 삭제 후 새로고침</button></div>';
  }
});
</script>
</body>
